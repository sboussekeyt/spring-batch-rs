name: Build

on:
  merge_group:
  pull_request:
  push:
    branches:
      - main


jobs:
  build:
    name: Builds on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build
        run: cargo build --release --all-features
