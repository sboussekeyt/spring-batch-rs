<svg width="140" height="140" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern gradient definitions -->
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce422b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0260f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="70" cy="70" r="66" fill="url(#primaryGradient)" filter="url(#shadow)" opacity="0.95"/>

  <!-- Inner circle for depth -->
  <circle cx="70" cy="70" r="60" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>

  <!-- Batch processing gear/cog -->
  <g transform="translate(70, 70)">
    <!-- Gear outer ring -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="url(#accentGradient)" stroke-width="3" opacity="0.7"/>

    <!-- Gear teeth (8 teeth for batch/parallel processing) -->
    <g opacity="0.9">
      <rect x="-4" y="-52" width="8" height="12" rx="2" fill="url(#accentGradient)" transform="rotate(0)"/>
      <rect x="-4" y="-52" width="8" height="12" rx="2" fill="url(#accentGradient)" transform="rotate(45)"/>
      <rect x="-4" y="-52" width="8" height="12" rx="2" fill="url(#accentGradient)" transform="rotate(90)"/>
      <rect x="-4" y="-52" width="8" height="12" rx="2" fill="url(#accentGradient)" transform="rotate(135)"/>
      <rect x="-4" y="-52" width="8" height="12" rx="2" fill="url(#accentGradient)" transform="rotate(180)"/>
      <rect x="-4" y="-52" width="8" height="12" rx="2" fill="url(#accentGradient)" transform="rotate(225)"/>
      <rect x="-4" y="-52" width="8" height="12" rx="2" fill="url(#accentGradient)" transform="rotate(270)"/>
      <rect x="-4" y="-52" width="8" height="12" rx="2" fill="url(#accentGradient)" transform="rotate(315)"/>
    </g>

    <!-- Central white circle -->
    <circle cx="0" cy="0" r="38" fill="#ffffff" opacity="0.98"/>

    <!-- Rust crab simplified (centered) -->
    <g>
      <!-- Crab body -->
      <ellipse cx="0" cy="2" rx="18" ry="16" fill="url(#rustGradient)"/>

      <!-- Left claw -->
      <path d="M -20,-3 Q -25,-6 -28,-3 Q -29,0 -26,3 L -18,0 Z" fill="#ce422b" opacity="0.9"/>
      <circle cx="-28" cy="-3" r="3.5" fill="#a0260f"/>

      <!-- Right claw -->
      <path d="M 20,-3 Q 25,-6 28,-3 Q 29,0 26,3 L 18,0 Z" fill="#ce422b" opacity="0.9"/>
      <circle cx="28" cy="-3" r="3.5" fill="#a0260f"/>

      <!-- Eyes -->
      <circle cx="-7" cy="0" r="3" fill="#ffffff"/>
      <circle cx="7" cy="0" r="3" fill="#ffffff"/>
      <circle cx="-7" cy="0" r="1.5" fill="#1a1a1a"/>
      <circle cx="7" cy="0" r="1.5" fill="#1a1a1a"/>

      <!-- Legs (left) -->
      <path d="M -14,10 Q -18,14 -16,19" stroke="#ce422b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M -9,11 Q -12,16 -9,20" stroke="#ce422b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M -4,12 Q -5,17 -2,21" stroke="#ce422b" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- Legs (right) -->
      <path d="M 14,10 Q 18,14 16,19" stroke="#ce422b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M 9,11 Q 12,16 9,20" stroke="#ce422b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M 4,12 Q 5,17 2,21" stroke="#ce422b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Data flow arrows representing batch processing -->
  <g opacity="0.8" filter="url(#glow)">
    <!-- Top left arrow (input) -->
    <path d="M 20,25 L 38,25 L 38,21 L 47,28 L 38,35 L 38,31 L 20,31 Z" fill="#c4b5fd"/>

    <!-- Top right arrow (processing) -->
    <path d="M 120,25 L 102,25 L 102,21 L 93,28 L 102,35 L 102,31 L 120,31 Z" fill="#c4b5fd"/>

    <!-- Bottom left arrow (output) -->
    <path d="M 20,109 L 38,109 L 38,105 L 47,112 L 38,119 L 38,115 L 20,115 Z" fill="#c4b5fd"/>

    <!-- Bottom right arrow (batch) -->
    <path d="M 120,109 L 102,109 L 102,105 L 93,112 L 102,119 L 102,115 L 120,115 Z" fill="#c4b5fd"/>
  </g>

  <!-- Processing dots indicating data chunks -->
  <g opacity="0.7">
    <circle cx="25" cy="45" r="2.5" fill="#d8b4fe"/>
    <circle cx="115" cy="45" r="2.5" fill="#d8b4fe"/>
    <circle cx="25" cy="95" r="2.5" fill="#d8b4fe"/>
    <circle cx="115" cy="95" r="2.5" fill="#d8b4fe"/>
    <circle cx="25" cy="70" r="2.5" fill="#d8b4fe"/>
    <circle cx="115" cy="70" r="2.5" fill="#d8b4fe"/>
  </g>

  <!-- Subtle connection lines (showing batch flow) -->
  <g stroke="#a78bfa" stroke-width="1.5" opacity="0.3" fill="none" stroke-dasharray="3,3">
    <path d="M 47,28 Q 60,28 70,32"/>
    <path d="M 93,28 Q 80,28 70,32"/>
    <path d="M 47,112 Q 60,112 70,108"/>
    <path d="M 93,112 Q 80,112 70,108"/>
  </g>
</svg>
